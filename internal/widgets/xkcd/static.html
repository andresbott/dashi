<div class="widget-xkcd">
    <div class="xkcd-title">{{.Title}}</div>
    <div class="xkcd-image">
        <img src="{{.Img}}" alt="{{.Alt}}" style="max-width:100%;max-height:100%;object-fit:contain;" />
    </div>
    <div class="xkcd-alt">{{.Alt}}</div>
    <div class="xkcd-number">#{{.Num}}</div>
</div>
