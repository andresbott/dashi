version: 2
builds:
  # =====================================================================================
  # macOS build
  # =====================================================================================
  - id: darwin
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    goamd64:
      - v2
      - v3
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/andresbott/dashi/app/metainfo.Version={{.Version}}
      - -X github.com/andresbott/dashi/app/metainfo.BuildTime={{.Date}}
      - -X github.com/andresbott/dashi/app/metainfo.ShaVer={{.Commit}}
    binary: dashi
    env:
      - CGO_ENABLED=1

archives:
  - formats: [zip]
    name_template: >-
      dashi_
      {{- title .Os  }}_
      {{- if eq .Arch "amd64" }}x86_64_{{ .Amd64 }}
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums_darwin.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true

release:
  mode: append
